name: Test and Release (Windows)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  # 1. Задача проведения юнит-тестов (запускается при каждом пуше и теге)
  test:
    name: Run Unit Tests
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install pytest

      - name: Run tests
        run: |
          pytest tests.py

  # 2. Задача создания релиза (только при наличии тега и изменении файла version)
  release:
    name: Create Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Нужно для сравнения текущего коммита с предыдущим

      - name: Check if 'version' file changed
        id: check_version
        shell: pwsh
        run: |
          # Получаем список измененных файлов в последнем коммите
          $changedFiles = git diff-tree --no-commit-id --name-only -r $env:GITHUB_SHA
          echo "Измененные файлы: $changedFiles"
          
          if ($changedFiles -split "`n" -contains "version") {
            echo "changed=true" >> $env:GITHUB_OUTPUT
            echo "Файл version изменен. Продолжаем создание релиза."
          } else {
            echo "changed=false" >> $env:GITHUB_OUTPUT
            echo "Файл version не менялся. Пропуск релиза."
          }

      - name: Package files
        if: steps.check_version.outputs.changed == 'true'
        run: |
          # Собираем только файлы из корня, исключая tests.py и папки
          Get-ChildItem -Path . -File | 
          Where-Object { $_.Name -ne "tests.py" -and $_.Name -ne "EdiMessageSender.zip" } | 
          Compress-Archive -DestinationPath EdiMessageSender.zip -Force

      - name: Create GitHub Release
        if: steps.check_version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: EdiMessageSender.zip
          # Использует имя тега, который вы пушите
          name: Release ${{ github.ref_name }}
          body: "Автоматический релиз при обновлении версии."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}