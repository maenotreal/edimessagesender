name: Test and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  # 1. Задача проведения юнит-тестов
  test:
    name: Run Unit Tests
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install pytest

      - name: Run tests
        run: |
          pytest tests.py

  # 2. Задача создания релиза
  release:
    name: Create Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package files
        # Используем PowerShell для фильтрации и архивации
        run: |
          # Get-ChildItem -File выбирает только файлы в корне (игнорируя все папки)
          # Where-Object исключает конкретный файл tests.py
          # Compress-Archive создает итоговый zip
          Get-ChildItem -Path . -File | 
          Where-Object { $_.Name -ne "tests.py" } | 
          Compress-Archive -DestinationPath project_release.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: project_release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
