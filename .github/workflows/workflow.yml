name: Test and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Релиз будет создаваться только при пуше тега, например: git tag v1.0.0 && git push --tags

jobs:
  # 1. Задача проведения юнит-тестов
  test:
    name: Run Unit Tests
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Установка зависимостей, если есть requirements.txt
          if ( -f requirements.txt ); then pip install -r requirements.txt; fi
          # Установка фреймворка для тестов (например, pytest)
          pip install pytest

      - name: Run tests
        run: |
          # Запуск тестов
          pytest tests.py

  # 2. Задача создания релиза (запускается только после успешных тестов и только для тегов)
  release:
    name: Create Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    permissions:
      contents: write # Необходимо для создания релиза в GitHub
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package files
        run: |
          # Команда find ищет только файлы (-type f) в корневой директории (-maxdepth 1)
          # Она исключает файл tests.py и скрытые файлы/папки (начинающиеся с точки, например .git)
          # Затем найденные файлы запаковываются в project_release.zip
          find . -maxdepth 1 -type f ! -name "tests.py" ! -name ".*" -print | zip project_release.zip -@

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: project_release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
