# ─────────────────────────────────────────────────────────────────────────────
# test.yml — Запуск юнит-тестов на каждый push и pull request
#
# Тесты группируются по модулям и каждый тест отображается с эмодзи:
#   ✅ — пройден
#   ❌ — провален
#   ⏭️ — пропущен
# ─────────────────────────────────────────────────────────────────────────────

name: "🧪 Tests"

on:
  push:
    branches: [main]
    paths-ignore:
      - "version.json"
      - "*.md"
      - ".gitignore"
      - "LICENSE"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "version.json"
      - "*.md"
      - ".gitignore"
      - "LICENSE"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  test:
    name: "Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v5

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # ── Кеширование pip ─────────────────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\pip\Cache
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── Зависимости ─────────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      # ── Запуск тестов ───────────────────────────────────────────────────────
      - name: Run pytest (raw output)
        id: pytest
        run: |
          python -m pytest tests.py -v --tb=short --cov=. --cov-report=term-missing > pytest_output.txt 2>&1 || true
          python -c "import sys; sys.exit(0 if 'failed' not in open('pytest_output.txt').read().split()[-2:][0] else 1)" || echo "HAS_FAILURES=true" >> $GITHUB_ENV
        shell: bash

      # ── Форматированный отчёт ───────────────────────────────────────────────
      - name: Format test report
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          python3 -u -c "
          # -*- coding: utf-8 -*-
          import sys, re, io

          if sys.stdout.encoding != 'utf-8':
              sys.stdout = io.TextIOWrapper(sys.stdout.buffer, encoding='utf-8', errors='replace')

          with open('pytest_output.txt', encoding='utf-8', errors='replace') as f:
              stdout = f.read()

          test_line = re.compile(
              r'tests\.py::(\w+)::(\w+)\s+(PASSED|FAILED|SKIPPED|ERROR|XFAIL|XPASS)'
          )

          STATUS_EMOJI = {
              'PASSED':  '\u2705',
              'FAILED':  '\u274c',
              'ERROR':   '\U0001f4a5',
              'SKIPPED': '\u23ed\ufe0f',
              'XFAIL':   '\U0001f536',
              'XPASS':   '\U0001f537',
          }

          GROUP_ORDER = [
              'TestConfig',
              'TestAuth',
              'TestXmlBuilder',
              'TestRecadvBuilder',
              'TestStore',
              'TestApi',
              'TestUpdater',
              'TestIntegration',
              'TestVersionJson',
              'TestValidateGln',
          ]

          GROUP_NAMES = {
              'TestConfig':        '\u2699\ufe0f  Config \u2014 \u041a\u043e\u043d\u0444\u0438\u0433\u0443\u0440\u0430\u0446\u0438\u044f',
              'TestAuth':          '\U0001f510 Auth \u2014 \u0410\u0432\u0442\u043e\u0440\u0438\u0437\u0430\u0446\u0438\u044f',
              'TestXmlBuilder':    '\U0001f4dd XmlBuilder \u2014 \u0413\u0435\u043d\u0435\u0440\u0430\u0446\u0438\u044f XML',
              'TestRecadvBuilder': '\U0001f4e6 RecadvBuilder \u2014 \u0413\u0435\u043d\u0435\u0440\u0430\u0446\u0438\u044f RECADV',
              'TestStore':         '\U0001f4be Store \u2014 \u0425\u0440\u0430\u043d\u0438\u043b\u0438\u0449\u0435 \u0434\u0430\u043d\u043d\u044b\u0445',
              'TestApi':           '\U0001f310 API \u2014 \u041a\u043b\u0438\u0435\u043d\u0442 EDI API',
              'TestUpdater':       '\U0001f504 Updater \u2014 \u0410\u0432\u0442\u043e\u043e\u0431\u043d\u043e\u0432\u043b\u0435\u043d\u0438\u0435',
              'TestIntegration':   '\U0001f517 Integration \u2014 \u0418\u043d\u0442\u0435\u0433\u0440\u0430\u0446\u0438\u043e\u043d\u043d\u044b\u0435 \u0442\u0435\u0441\u0442\u044b',
              'TestVersionJson':   '\U0001f4cb VersionJson \u2014 \u0421\u0442\u0440\u0443\u043a\u0442\u0443\u0440\u0430 version.json',
              'TestValidateGln':   '\U0001f4cd ValidateGln \u2014 \u0412\u0430\u043b\u0438\u0434\u0430\u0446\u0438\u044f GLN',
          }

          groups = {}
          for cls in GROUP_ORDER:
              groups[cls] = []

          for line in stdout.splitlines():
              m = test_line.search(line)
              if m:
                  cls, test, status = m.group(1), m.group(2), m.group(3)
                  if cls not in groups:
                      groups[cls] = []
                  groups[cls].append((test, status))

          total = passed = failed = skipped = errors = 0

          for cls in list(GROUP_ORDER) + [k for k in groups if k not in GROUP_ORDER]:
              tests = groups.get(cls, [])
              if not tests:
                  continue

              group_label = GROUP_NAMES.get(cls, '\U0001f539 ' + cls)
              cls_passed = sum(1 for _, s in tests if s == 'PASSED')
              cls_failed = sum(1 for _, s in tests if s in ('FAILED', 'ERROR'))
              cls_total = len(tests)
              icon = '\u274c' if cls_failed > 0 else '\u2705'

              print('::group::' + icon + ' ' + group_label + '  (' + str(cls_passed) + '/' + str(cls_total) + ' \u043f\u0440\u043e\u0439\u0434\u0435\u043d\u043e)')
              print()

              for test_name, status in tests:
                  emoji = STATUS_EMOJI.get(status, '\u2753')
                  display = test_name.replace('test_', '', 1)
                  print('  ' + emoji + ' ' + display)
                  total += 1
                  if status == 'PASSED':
                      passed += 1
                  elif status == 'FAILED':
                      failed += 1
                  elif status == 'ERROR':
                      errors += 1
                  elif status == 'SKIPPED':
                      skipped += 1

              print()
              print('::endgroup::')

          print()
          print('\u2500' * 60)

          if failed + errors == 0:
              line = '\U0001f389 \u0412\u0441\u0435 \u0442\u0435\u0441\u0442\u044b \u043f\u0440\u043e\u0439\u0434\u0435\u043d\u044b!  \u2705 ' + str(passed) + ' passed'
          else:
              line = '\U0001f494 \u0415\u0441\u0442\u044c \u043e\u0448\u0438\u0431\u043a\u0438!  \u274c ' + str(failed) + ' failed  \U0001f4a5 ' + str(errors) + ' errors  \u2705 ' + str(passed) + ' passed'

          if skipped:
              line += '  \u23ed\ufe0f ' + str(skipped) + ' skipped'

          line += '  (\u0432\u0441\u0435\u0433\u043e: ' + str(total) + ')'
          print(line)
          print('\u2500' * 60)

          # Coverage
          print()
          print('::group::\U0001f4ca Coverage')
          cov_started = False
          for l in stdout.splitlines():
              if '---------- coverage:' in l or l.startswith('Name '):
                  cov_started = True
              if cov_started:
                  print(l)
              if cov_started and l.startswith('TOTAL'):
                  break
          print('::endgroup::')

          # Ошибки
          if failed + errors > 0:
              print()
              print('::group::\U0001f4a5 \u041f\u043e\u0434\u0440\u043e\u0431\u043d\u043e\u0441\u0442\u0438 \u043e\u0448\u0438\u0431\u043e\u043a')
              in_failures = False
              for l in stdout.splitlines():
                  if 'FAILURES' in l or 'ERRORS' in l:
                      in_failures = True
                  if in_failures:
                      print(l)
                  if in_failures and 'short test summary' in l:
                      break
              print('::endgroup::')
          "

      # ── Финальная проверка статуса ──────────────────────────────────────────
      - name: Check test results
        shell: bash
        run: |
          python -m pytest tests.py --tb=no -q > /dev/null 2>&1

      # ── Загрузка coverage (только ubuntu + последний Python) ────────────────
      - name: Upload coverage report
        if: matrix.python-version == '3.13' && always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
