# ─────────────────────────────────────────────────────────────────────────────
# test.yml — Запуск юнит-тестов на каждый push и pull request
#
# Тесты группируются по модулям и каждый тест отображается с эмодзи:
#   ✅ — пройден
#   ❌ — провален
#   ⏭️ — пропущен
# ─────────────────────────────────────────────────────────────────────────────

name: "🧪 Tests"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ── Кеширование pip ─────────────────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\pip\Cache
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── Зависимости ─────────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      # ── Тесты с группировкой и эмодзи ──────────────────────────────────────
      - name: Run tests
        shell: python
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1
        run: |
          import subprocess, sys, re, os, io

          # Принудительно UTF-8 для stdout/stderr (Windows cp1252 fix)
          if sys.stdout.encoding != "utf-8":
              sys.stdout = io.TextIOWrapper(sys.stdout.buffer, encoding="utf-8", errors="replace")
              sys.stderr = io.TextIOWrapper(sys.stderr.buffer, encoding="utf-8", errors="replace")

          # ── Запуск pytest с verbose ───────────────────────────────────────
          result = subprocess.run(
              [sys.executable, "-m", "pytest", "tests.py", "-v", "--tb=short",
               "--cov=.", "--cov-report=term-missing"],
              capture_output=True, text=True, encoding="utf-8"
          )

          stdout = result.stdout
          stderr = result.stderr

          # ── Парсим результаты тестов ──────────────────────────────────────
          # pytest -v выводит строки вида:
          #   tests.py::TestConfig::test_create_default_writes_file PASSED
          #   tests.py::TestApi::test_is_xml_detects_xml_bytes FAILED

          test_line = re.compile(
              r"tests\.py::(\w+)::(\w+)\s+(PASSED|FAILED|SKIPPED|ERROR|XFAIL|XPASS)"
          )

          STATUS_EMOJI = {
              "PASSED":  "\u2705",
              "FAILED":  "\u274c",
              "ERROR":   "\U0001f4a5",
              "SKIPPED": "\u23ed\ufe0f",
              "XFAIL":   "\U0001f536",
              "XPASS":   "\U0001f537",
          }

          GROUP_NAMES = {
              "TestConfig":        "\u2699\ufe0f  Config \u2014 \u041a\u043e\u043d\u0444\u0438\u0433\u0443\u0440\u0430\u0446\u0438\u044f",
              "TestAuth":          "\U0001f510 Auth \u2014 \u0410\u0432\u0442\u043e\u0440\u0438\u0437\u0430\u0446\u0438\u044f",
              "TestXmlBuilder":    "\U0001f4dd XmlBuilder \u2014 \u0413\u0435\u043d\u0435\u0440\u0430\u0446\u0438\u044f XML",
              "TestRecadvBuilder": "\U0001f4e6 RecadvBuilder \u2014 \u0413\u0435\u043d\u0435\u0440\u0430\u0446\u0438\u044f RECADV",
              "TestStore":         "\U0001f4be Store \u2014 \u0425\u0440\u0430\u043d\u0438\u043b\u0438\u0449\u0435 \u0434\u0430\u043d\u043d\u044b\u0445",
              "TestApi":           "\U0001f310 API \u2014 \u041a\u043b\u0438\u0435\u043d\u0442 EDI API",
              "TestUpdater":       "\U0001f504 Updater \u2014 \u0410\u0432\u0442\u043e\u043e\u0431\u043d\u043e\u0432\u043b\u0435\u043d\u0438\u0435",
              "TestIntegration":   "\U0001f517 Integration \u2014 \u0418\u043d\u0442\u0435\u0433\u0440\u0430\u0446\u0438\u043e\u043d\u043d\u044b\u0435 \u0442\u0435\u0441\u0442\u044b",
          }

          # Группируем: {class_name: [(test_name, status), ...]}
          from collections import OrderedDict
          groups = OrderedDict()
          for cls in GROUP_NAMES:
              groups[cls] = []

          for line in stdout.splitlines():
              m = test_line.search(line)
              if m:
                  cls, test, status = m.group(1), m.group(2), m.group(3)
                  if cls not in groups:
                      groups[cls] = []
                  groups[cls].append((test, status))

          # ── Выводим красивый отчёт ───────────────────────────────────────
          total = passed = failed = skipped = errors = 0

          for cls, tests in groups.items():
              if not tests:
                  continue

              group_label = GROUP_NAMES.get(cls, f"\U0001f539 {cls}")
              cls_passed  = sum(1 for _, s in tests if s == "PASSED")
              cls_failed  = sum(1 for _, s in tests if s in ("FAILED", "ERROR"))
              cls_total   = len(tests)

              if cls_failed > 0:
                  group_icon = "\u274c"
              else:
                  group_icon = "\u2705"

              print(f"::group::{group_icon} {group_label}  ({cls_passed}/{cls_total} \u043f\u0440\u043e\u0439\u0434\u0435\u043d\u043e)")
              print()

              for test_name, status in tests:
                  emoji = STATUS_EMOJI.get(status, "\u2753")
                  display = test_name.replace("test_", "", 1)
                  print(f"  {emoji} {display}")

                  total += 1
                  if status == "PASSED":
                      passed += 1
                  elif status == "FAILED":
                      failed += 1
                  elif status == "ERROR":
                      errors += 1
                  elif status == "SKIPPED":
                      skipped += 1

              print()
              print("::endgroup::")

          # ── Итоговая сводка ──────────────────────────────────────────────
          print()
          print("\u2500" * 60)

          if failed + errors == 0:
              summary = f"\U0001f389 \u0412\u0441\u0435 \u0442\u0435\u0441\u0442\u044b \u043f\u0440\u043e\u0439\u0434\u0435\u043d\u044b!  \u2705 {passed} passed"
          else:
              summary = f"\U0001f494 \u0415\u0441\u0442\u044c \u043e\u0448\u0438\u0431\u043a\u0438!  \u274c {failed} failed  \U0001f4a5 {errors} errors  \u2705 {passed} passed"

          if skipped:
              summary += f"  \u23ed\ufe0f {skipped} skipped"

          summary += f"  (\u0432\u0441\u0435\u0433\u043e: {total})"
          print(summary)
          print("\u2500" * 60)

          # ── Coverage отчёт ───────────────────────────────────────────────
          print()
          print("::group::\U0001f4ca Coverage")
          cov_started = False
          for line in stdout.splitlines():
              if "---------- coverage:" in line or line.startswith("Name "):
                  cov_started = True
              if cov_started:
                  print(line)
              if cov_started and line.startswith("TOTAL"):
                  break
          print("::endgroup::")

          # ── Ошибки если есть ─────────────────────────────────────────────
          if failed + errors > 0:
              print()
              print("::group::\U0001f4a5 \u041f\u043e\u0434\u0440\u043e\u0431\u043d\u043e\u0441\u0442\u0438 \u043e\u0448\u0438\u0431\u043e\u043a")
              in_failures = False
              for line in stdout.splitlines():
                  if "FAILURES" in line or "ERRORS" in line:
                      in_failures = True
                  if in_failures:
                      print(line)
                  if in_failures and "short test summary" in line:
                      break
              if stderr.strip():
                  print("\nstderr:")
                  print(stderr)
              print("::endgroup::")

          sys.exit(result.returncode)

      # ── Загрузка coverage (только ubuntu + последний Python) ────────────────
      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
