# ─────────────────────────────────────────────────────────────────────────────
# release.yml — Создание релиза при пуше тега v*.*.*
#
# Порядок работы:
#   1. Прогоняет тесты (Windows)
#   2. Собирает edimessagesender.exe через PyInstaller (Windows)
#   3. Обновляет version.json номером из тега
#   4. Собирает ZIP-архив EdiMessageSender.zip
#   5. Генерирует changelog из коммитов
#   6. Создаёт GitHub Release с ZIP и EXE
#
# Как выпустить новую версию:
#   git tag v1.2.0
#   git push origin v1.2.0
# ─────────────────────────────────────────────────────────────────────────────

name: "🚀 Release"

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ── 1. Тесты ────────────────────────────────────────────────────────────────
  test:
    name: "Run Tests before Release"
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests.py -v --tb=short

  # ── 2. Сборка EXE ───────────────────────────────────────────────────────────
  build-exe:
    name: "Build EXE"
    needs: test
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          python -m PyInstaller --onefile --console --name edimessagesender `
            --add-data "version.json;." `
            main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v5
        with:
          name: edimessagesender-exe
          path: dist/edimessagesender.exe
          retention-days: 1

  # ── 3. Сборка и Релиз ───────────────────────────────────────────────────────
  release:
    name: "Build & Publish Release"
    needs: build-exe
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Извлекаем версию из тега ────────────────────────────────────────────
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "📦 Building release for version: $TAG"

      # ── Скачиваем собранный EXE ─────────────────────────────────────────────
      - name: Download EXE artifact
        uses: actions/download-artifact@v5
        with:
          name: edimessagesender-exe
          path: dist/

      # ── Обновляем version.json ──────────────────────────────────────────────
      - name: Update version.json
        run: |
          python3 -c "
          import json
          with open('version.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          data['version'] = '${{ steps.version.outputs.version }}'
          with open('version.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
              f.write('\n')
          print('version.json updated to ' + data['version'])
          "

      # ── Коммитим обновлённый version.json ──────────────────────────────────
      - name: Commit updated version.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          if git diff --staged --quiet; then
            echo "version.json уже актуален — коммит не нужен."
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
            git push origin HEAD:main
          fi

      # ── Собираем ZIP ────────────────────────────────────────────────────────
      - name: Package release archive
        run: |
          # Файлы и папки, которые НЕ попадут в релиз
          EXCLUDE=(
            "tests.py"
            ".github"
            ".git"
            ".gitignore"
            "dist"
            "__pycache__"
            "*.pyc"
            ".pytest_cache"
            "coverage.xml"
          )

          EXCLUDE_ARGS=""
          for pattern in "${EXCLUDE[@]}"; do
            EXCLUDE_ARGS="$EXCLUDE_ARGS --exclude=$pattern"
          done

          zip -r dist/EdiMessageSender.zip . $EXCLUDE_ARGS \
            -x ".git/*" ".github/*" "__pycache__/*" ".pytest_cache/*" "dist/*"

          echo "📦 Archive contents:"
          unzip -l dist/EdiMessageSender.zip

      # ── Генерируем changelog ────────────────────────────────────────────────
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            RAW_COMMITS=$(git log --oneline --pretty=format:"%s (%h)" HEAD)
          else
            RAW_COMMITS=$(git log --oneline --pretty=format:"%s (%h)" "$PREV_TAG"..HEAD)
          fi

          # Фильтруем служебные коммиты: chore, ci, docs, readme, gitignore, bump version
          COMMITS=$(echo "$RAW_COMMITS" | grep -viE \
            '^(chore|ci|docs|style|test|build)\b|bump version|\.gitignore|readme' \
            | sed 's/^/- /')

          if [ -z "$COMMITS" ]; then
            COMMITS="- Технические улучшения и исправления"
          fi

          {
            echo "## Что нового в v${{ steps.version.outputs.version }}"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "---"
            echo "**Скрипт:** скачайте \`EdiMessageSender.zip\`, распакуйте и запустите \`python main.py\`"
            echo ""
            echo "**EXE:** скачайте \`edimessagesender.exe\` и запустите напрямую (Python не нужен)"
          } > changelog.md

          cat changelog.md

      # ── Создаём GitHub Release ──────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "EDI Message Sender v${{ steps.version.outputs.version }}"
          body_path: changelog.md
          files: |
            dist/EdiMessageSender.zip
            dist/edimessagesender.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
